name: mikrotik_isp_manager
description: Enterprise ISP Management System for MikroTik networks
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  firebase_core: ^2.27.0
  firebase_auth: ^4.19.0
  firebase_database: ^10.4.0
  firebase_messaging: ^14.8.0
  firebase_storage: ^11.6.0
  cloud_firestore: ^4.17.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  dartz: ^0.10.1
  intl: ^0.19.0
  pdf: ^3.10.8
  printing: ^5.12.0
  qr_flutter: ^4.1.0
  fl_chart: ^0.68.0
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  flutter_local_notifications: ^17.2.1+2
  cupertino_icons: ^1.0.8
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/fonts/
