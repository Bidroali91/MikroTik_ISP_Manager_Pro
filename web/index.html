<html>

  <style>
    body { margin: 0; padding: 0; background: #121212; }

    .spinner { width: 48px; height: 48px; border: 4px solid rgba(21,101,192,0.2); border-top-color: #1565C0; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () { /* navigator.serviceWorker.register('/flutter_service_worker.js'); */ });
    }
  </script>
</head>
<body>
  <div id="loading"><div class="spinner"></div><p style="margin-top:16px;font-family:sans-serif;">Loading MikroTik ISP Manager...</p></div>
  <script src="flutter.js" defer></script>
  <script>window.addEventListener('load', function(ev) { _flutter.loader.loadEntrypoint({ serviceWorker: { serviceWorkerVersion: '1.0.0' } }).then(function(engineInitializer) { return engineInitializer.initializeEngine(); }).then(function(appRunner) { appRunner.runApp(); }); });</script>
</body>
</html>
